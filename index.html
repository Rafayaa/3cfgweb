<!DOCTYPE html>
<link rel="stylesheet" href="style.css">
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#081b33,#0f3d75);
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
}

.card{
    width:400px;
    padding:40px;
    text-align:center;
    border-radius:24px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,.25);
}

.title{
    font-size:28px;
    margin-bottom:20px;
}

.version{
    opacity:.8;
    margin-bottom:25px;
}

.download-btn{
    display:inline-block;
    text-decoration:none;
    color:white;
    background:#2196f3;
    padding:14px 34px;
    border-radius:12px;
    font-weight:bold;
    transition:.25s;
}

.download-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 20px rgba(33,150,243,.7);
}

.info{
    margin-top:20px;
    opacity:.7;
    font-size:14px;
}

.credit{
    position:fixed;
    bottom:15px;
    right:20px;
    color:rgba(255,255,255,.6);
    font-size:12px;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">
        A download for big bro :)
    </div>

    <div class="version">
        Love you bro :)
    </div>

    <a class="download-btn"
       href="https://github.com/Rafayaa/3cfgweb/releases/download/PreBeta/game.apk">
       ⬇ Download Now
    </a>

    
    <a id="pluginBtn"
   class="download-btn"
   href="https://github.com/USERNAME/REPO/releases/latest/download/plugin.zip">
   🔌 Unduh Plugin
</a>
    <div class="info">
        fvck • Balagay • Gua mumet
    </div>
</div>

<div class="credit">
    By Rafa, first website
</div>
<script src="script.js"></script>
</body>
</body>
</html>
